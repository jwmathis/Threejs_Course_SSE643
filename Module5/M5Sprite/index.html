<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three.js Sprite Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container" style="position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 10px; align-items: center;">
        <button id="toggleSort">Toggle Depth Test</button>
        <span id="status" style="color: white; font-family: sans-serif; font-size: 12px;">Depth Test: OFF</span>
    </div>

    <canvas id="bg"></canvas>
    <script type="module" src="script.js"></script>

    <div id="tooltip" style="position: absolute; display: none; background: rgba(0,0,0,0.8); color: white; padding: 5px; border-radius: 4px; pointer-events: none;">
        Tooltip text
    </div>
</body>
</html>
